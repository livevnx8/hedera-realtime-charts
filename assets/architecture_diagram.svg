<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .background { fill: #1a1a2e; }
      .box { fill: #16213e; stroke: #00bfa5; stroke-width: 2; }
      .arrow { stroke: #00bfa5; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: Arial, sans-serif; fill: #fff; font-size: 14px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; fill: #fff; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00bfa5" />
    </marker>
  </defs>
  
  <rect width="800" height="500" class="background"/>
  
  <text x="400" y="30" class="title">Ultra Low-Latency Crypto Charts Architecture</text>
  
  <rect x="300" y="60" width="200" height="50" class="box" rx="5"/>
  <text x="400" y="90" class="text">Binance WebSocket</text>
  
  <line x1="400" y1="110" x2="400" y2="140" class="arrow"/>
  
  <rect x="300" y="140" width="200" height="50" class="box" rx="5"/>
  <text x="400" y="170" class="text">WebSocket Client</text>
  
  <line x1="400" y1="190" x2="400" y2="220" class="arrow"/>
  
  <rect x="300" y="220" width="200" height="50" class="box" rx="5"/>
  <text x="400" y="250" class="text">FastAPI Server</text>
  
  <line x1="400" y1="270" x2="250" y2="320" class="arrow"/>
  <line x1="400" y1="270" x2="400" y2="320" class="arrow"/>
  <line x1="400" y1="270" x2="550" y2="320" class="arrow"/>
  
  <rect x="150" y="320" width="200" height="50" class="box" rx="5"/>
  <text x="250" y="350" class="text">Streamlit</text>
  
  <rect x="300" y="320" width="200" height="50" class="box" rx="5"/>
  <text x="400" y="350" class="text">React</text>
  
  <rect x="450" y="320" width="200" height="50" class="box" rx="5"/>
  <text x="550" y="350" class="text">Plotly</text>
  
  <rect x="50" y="400" width="150" height="40" class="box" rx="5"/>
  <text x="125" y="425" class="text">MessagePack</text>
  
  <rect x="220" y="400" width="150" height="40" class="box" rx="5"/>
  <text x="295" y="425" class="text">TCP Opt</text>
  
  <rect x="390" y="400" width="150" height="40" class="box" rx="5"/>
  <text x="465" y="425" class="text">GPU Accel</text>
  
  <rect x="560" y="400" width="150" height="40" class="box" rx="5"/>
  <text x="635" y="425" class="text">CUDA</text>
  
  <text x="400" y="480" class="text">Sub-10ms latency with software optimization, sub-1ms with GPU</text>
</svg>
